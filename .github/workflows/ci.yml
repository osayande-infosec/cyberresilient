name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Check coverage
        run: pytest tests/ --cov=CyberResilient --cov-report=term-missing --cov-fail-under=60

  # ── SAST: Static Application Security Testing ────────────
  sast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tools
        run: pip install bandit -e .

      - name: Bandit security scan
        run: |
          bandit -r cyberresilient/ -ll --skip B101 \
            -f json -o bandit-report.json || true
          bandit -r cyberresilient/ -ll --skip B101
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/security-audit
            security/semgrep-rules.yml

  # ── SCA: Software Composition Analysis ───────────────────
  sca:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"

      - name: pip-audit (known vulnerabilities)
        run: pip-audit --strict --output pip-audit-report.json --format json || true

      - name: Safety check (CVE database)
        run: safety check --output json > safety-report.json || true

      - name: Upload SCA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            pip-audit-report.json
            safety-report.json

  # ── Fuzzing: Property-based & payload testing ────────────
  fuzz:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run fuzz tests (Hypothesis)
        run: pytest tests/test_security_fuzz.py -v --tb=short -x

  # ── IAST: Interactive Application Security Testing ───────
  iast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run IAST runtime security tests
        run: pytest tests/test_security_iast.py -v --tb=short -x

  # ── DAST: Dynamic Application Security Testing ──────────
  dast:
    runs-on: ubuntu-latest
    needs: [test, sast]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t CyberResilient:ci .

      - name: Start application
        run: |
          docker run -d --name cs-dast -p 8501:8501 CyberResilient:ci
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8501/_stcore/health | grep -q "ok"; then
              echo "App is healthy!"
              break
            fi
            sleep 2
          done

      - name: Security headers check
        run: |
          docker cp security/check_headers.py cs-dast:/tmp/check_headers.py
          docker exec cs-dast python /tmp/check_headers.py http://localhost:8501 || true

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: "http://localhost:8501"
          rules_file_name: "security/zap-rules.conf"
          fail_action: warn
          cmd_options: >-
            -I
            -j
            -a
        continue-on-error: true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

      - name: Stop application
        if: always()
        run: docker stop cs-dast && docker rm cs-dast

  # ── Container Security Scanning ──────────────────────────
  container-scan:
    runs-on: ubuntu-latest
    needs: [test, sast]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t CyberResilient:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "CyberResilient:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Trivy SBOM generation
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "CyberResilient:ci"
          format: "cyclonedx"
          output: "sbom.json"

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # ── Docker smoke test ────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [test, sast, sca, fuzz, iast]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t CyberResilient:ci .
      - name: Smoke test container
        run: |
          docker run -d --name cs-smoke -p 8501:8501 CyberResilient:ci
          sleep 15
          curl --fail http://localhost:8501/_stcore/health || exit 1
          docker stop cs-smoke
