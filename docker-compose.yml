version: "3.9"

services:
  CyberResilient:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: CyberResilient
    ports:
      - "8501:8501"
    volumes:
      - reports:/app/reports
      - db_data:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - CYBERRESILIENT_AUTH=false

volumes:
  reports:
    driver: local
  db_data:
    driver: local
