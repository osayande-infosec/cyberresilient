# CyberResilient Security Scanning Configuration
# ─────────────────────────────────────────────
# Semgrep rules for SAST analysis of the CyberResilient codebase.
# Custom rules supplement the built-in semgrep rulesets.

rules:
  # ── SQL Injection ────────────────────────────────────────
  - id: cyberresilient-sql-injection
    patterns:
      - pattern: |
          $QUERY = f"... {$VAR} ..."
          ...
          session.execute($QUERY)
    message: "Potential SQL injection via f-string. Use parameterized queries."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021 Injection"

  - id: cyberresilient-raw-sql-text
    patterns:
      - pattern: session.execute(text($SQL))
      - pattern-not: session.execute(text("..."), {...})
    message: "Raw SQL via text() — ensure parameterized or use ORM queries."
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-89"

  # ── XSS via unsafe_allow_html ────────────────────────────
  - id: cyberresilient-xss-user-input-html
    patterns:
      - pattern: st.markdown(..., unsafe_allow_html=True)
      - metavariable-regex:
          metavariable: $...ARGS
          regex: ".*\\bst\\.text_input\\b.*"
    message: "User input rendered with unsafe_allow_html=True — XSS risk."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-79"
      owasp: "A03:2021 Injection"

  # ── Hardcoded Secrets ────────────────────────────────────
  - id: cyberresilient-hardcoded-secret
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: ".*(password|secret|api_key|token|credential).*"
      - pattern-not: $VAR = ""
      - pattern-not: $VAR = "system"
      - pattern-not: $VAR = "student"
      - pattern-not: $VAR = "admin"
      - pattern-not: $VAR = "analyst"
      - pattern-not: $VAR = "auditor"
    message: "Possible hardcoded secret in variable '$VAR'."
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021 Identification and Authentication Failures"

  # ── Insecure Deserialization ─────────────────────────────
  - id: cyberresilient-pickle-usage
    pattern: pickle.loads(...)
    message: "pickle.loads() is unsafe — use json.loads() for untrusted data."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-502"
      owasp: "A08:2021 Software and Data Integrity Failures"

  - id: cyberresilient-yaml-unsafe-load
    pattern: yaml.load($DATA)
    fix: yaml.safe_load($DATA)
    message: "Use yaml.safe_load() instead of yaml.load() to prevent code execution."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-502"

  # ── Path Traversal ──────────────────────────────────────
  - id: cyberresilient-path-traversal
    patterns:
      - pattern: open(... + $USER_INPUT, ...)
      - pattern: Path(...) / $USER_INPUT
    message: "Potential path traversal — validate and sanitize file paths."
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-22"
      owasp: "A01:2021 Broken Access Control"

  # ── Debug Mode in Production ─────────────────────────────
  - id: cyberresilient-debug-mode
    pattern: "app.run(debug=True)"
    message: "Debug mode enabled — disable for production."
    languages: [python]
    severity: WARNING

  # ── Weak Cryptography ───────────────────────────────────
  - id: cyberresilient-weak-hash
    patterns:
      - pattern: hashlib.md5(...)
      - pattern: hashlib.sha1(...)
    message: "MD5/SHA1 are cryptographically weak — use SHA-256+ or bcrypt for passwords."
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-328"
      owasp: "A02:2021 Cryptographic Failures"
