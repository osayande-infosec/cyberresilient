"""
OWASP ZAP DAST Configuration for CyberResilient
Used by the ZAP baseline scan in CI/CD.
"""
# zap-baseline rules configuration
# Format: rule_id  action  (IGNORE, WARN, FAIL)
# https://www.zaproxy.org/docs/docker/baseline-scan/

# ── Always FAIL on critical findings ───────────────────────
10003	FAIL	# Vulnerable JS Library
10010	FAIL	# Cookie No HttpOnly Flag
10011	FAIL	# Cookie Without Secure Flag
10015	FAIL	# Incomplete or No Cache-control/Pragma Headers
10017	FAIL	# Cross-Domain JavaScript Source File Inclusion
10019	FAIL	# Content-Type Header Missing
10020	FAIL	# Anti-clickjacking Header Missing
10021	FAIL	# X-Content-Type-Options Header Missing
10023	FAIL	# Information Disclosure - Debug Error Messages
10024	FAIL	# Information Disclosure - Sensitive Information in URL
10025	FAIL	# Information Disclosure - Sensitive Information in HTTP Referrer Header
10027	FAIL	# Information Disclosure - Suspicious Comments
10035	FAIL	# Strict-Transport-Security Header Not Set
10036	FAIL	# HTTP Server Response Header
10037	FAIL	# Server Leaks Information via "X-Powered-By"
10038	FAIL	# Content Security Policy (CSP) Header Not Set
10049	FAIL	# Storable and Cacheable Content
10055	FAIL	# CSP: Wildcard Directive
10096	FAIL	# Timestamp Disclosure
10098	FAIL	# Cross-Domain Misconfiguration
10109	FAIL	# Modern Web Application

# ── WARN on lower-risk items ──────────────────────────────
10016	WARN	# Web Browser XSS Protection Not Enabled
10028	WARN	# Open Redirect
10029	WARN	# Cookie Poisoning
10040	WARN	# Secure Pages Include Mixed Content
10054	WARN	# Cookie without SameSite Attribute
10063	WARN	# Permissions Policy Header Not Set
10202	WARN	# Absence of Anti-CSRF Tokens
90022	WARN	# Application Error Disclosure
90033	WARN	# Loosely Scoped Cookie

# ── IGNORE — Streamlit-specific false positives ──────────
10012	IGNORE	# Password Autocomplete (not applicable — Streamlit manages forms)
10050	IGNORE	# Retrieved from Cache (Streamlit uses aggressive caching)
